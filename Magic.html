<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Magic Moments</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card share-card">

    <img
      src="Magic.png"
      alt="Magic moments greeting card"
      class="card-image"
      
    />

    <h4>&#129668;You make magical moments&#129668;</h4>

    <p class="message">
     
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card &#10024;
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Every Moment With You",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
