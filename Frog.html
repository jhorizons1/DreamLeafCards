<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lucky Frog</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card">

    <img
      src="FrogLuck.png"
      alt="Lucky Frog"
      class="card-image"
    />

    <h1>Lucky Frog</h1>

    <p class="message">
      Like a lucky frog resting peacefully on a pond,
      you bring calm, happiness, and good vibes wherever you go.
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Lucky Frog",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
