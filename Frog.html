<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lucky Frog</title>

  <link rel="stylesheet" href="styles.css" />
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XDQZ6QW7JZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XDQZ6QW7JZ');
</script>
 
</head>

<body>

  <div class="card share-card">

    <img
      src="FrogLuck.png"
      alt="Lucky Frog"
      class="card-image horizontal-card"
    />
    <br>

    <h1>&#127808;!Good Luck!&#127808;</h1>

    <p class="message">
      Sending lucky vibes and a pocket full of clovers.
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card &#10024;
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Lucky Frog",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
