<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Birthday in Space</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card">

    <img
      src="SpaceBirthday.png"
      alt="Space birthday card"
      class="card-image"
    />

    <h1>Happy Birthday!!!</h1>

    <p class="message">
      May your year be filled with laughter, magic, friendship, and moments that shine as brightly as the stars.
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Happy Birthday!",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
