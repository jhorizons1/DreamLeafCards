<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Whale of a Friend</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card">

    <img
      src="WhaleOfAFriend.png"
      alt="Whale of a Friend"
      class="card-image"
    />

    <h1>Whale of a Friend</h1>

    <p class="message">
      Thanks for always making waves of kindness wherever you go.
      You're truly a whale of a friend!
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Whale of a Friend",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
