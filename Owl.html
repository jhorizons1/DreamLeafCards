<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Owl Always Be There</title>

  <link rel="stylesheet" href="styles.css" />
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XDQZ6QW7JZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XDQZ6QW7JZ');
</script>
 
</head>

<body>

  <div class="card share-card">

    <img
      src="Owl.png"
      alt="Owl always be there card"
      class="card-image verticle-card-img"
    />
    <br>
    <h4>&#129417;Always&#129417;</h4>

    <p class="message">
      Whenever you need a friend, just remember - owl always be there.
    </p>

    <button class="share-btn" onclick="shareCard()">
      Share This Card &#10024;
    </button>

  </div>

  <script>
    function shareCard() {

      if (navigator.share) {

        navigator.share({
          title: "Always",
          text: "Check out this greeting card!",
          url: window.location.href
        })

        .then(() => console.log("Shared successfully"))
        .catch((error) => console.log("Error sharing:", error));

      } else {

        alert("Sharing is not supported on this browser.");

      }
    }
  </script>

</body>
</html>
